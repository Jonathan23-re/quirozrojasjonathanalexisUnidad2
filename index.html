<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saber Hacer U2 - GameStore</title>
    <!-- Framework Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <!-- Navbar actualizada con botón de Administrador oculto -->
    <nav class="navbar navbar-expand-lg custom-navbar sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🎮 GameStore</a>
            <div class="d-flex align-items-center">
                <!-- Saludo al usuario -->
                <span id="userGreeting" class="me-3 fw-bold d-none"></span>
                
                <!-- Botón de panel admin protegido (Solo visible para administradores) -->
                <a href="admin.php" id="btnAdminPanel" class="btn btn-danger btn-sm me-2 d-none">Panel Admin</a>
                
                <button id="btnLoginOpen" class="btn btn-dark btn-sm custom-btn">Identifícate</button>
                <button id="btnLogout" class="btn btn-outline-dark btn-sm d-none">Salir</button>
            </div>
        </div>
    </nav>

    <!-- Modal de Inicio de Sesión / Registro / Recuperación -->
    <div id="loginModal" class="modal-overlay d-none">
        <div class="login-box animate-modal">
            <h4 class="text-center mb-4" id="modalTitle">Iniciar Sesión</h4>
            
            <!-- Mensajes de alerta (errores o éxito) -->
            <div id="alertMessage" class="alert d-none small"></div>

            <input type="text" id="usernameInput" class="form-control mb-3" placeholder="Usuario">
            <input type="password" id="passwordInput" class="form-control mb-3" placeholder="Contraseña">
            
            <button id="btnSubmitForm" class="btn btn-primary w-100 custom-btn mb-2">Entrar</button>
            
            <!-- Controles dinámicos para alternar vistas -->
            <div class="text-center mt-3">
                <span class="small text-muted" id="toggleText">¿No tienes cuenta?</span> 
                <button id="btnToggleMode" class="btn btn-link btn-sm p-0">Regístrate</button>
            </div>
            <div class="text-center mt-1">
                <button id="btnRecoverMode" class="btn btn-link btn-sm p-0 text-danger">Olvidé mi contraseña</button>
            </div>
            
            <button id="btnCloseModal" class="btn btn-link w-100 text-muted mt-2">Cerrar</button>
        </div>
    </div>

    <!-- Carrusel de Imágenes -->
    <div id="promoCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://imagenes.hobbyconsolas.com/files/image_640_360/uploads/imagenes/2024/03/02/69039c8c2ae09.jpeg" class="d-block w-100 banner-img" alt="Promo 1">
            </div>
            <div class="carousel-item">
                <img src="https://www.desconsolados.com/wp-content/uploads/2016/04/dark_souls_3_logo.jpg" class="d-block w-100 banner-img" class="d-block w-100 banner-img" alt="Promo 2">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#promoCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#promoCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <!-- Catálogo de Productos -->
    <div class="container py-5">
        <h2 class="mb-4 fw-light">Descubre lo más vendido</h2>
        
        <!-- Indicador de carga -->
        <div id="loadingIndicator" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Cargando catálogo...</p>
        </div>

        <!-- Los productos se inyectan aquí dinámicamente con JS -->
        <div class="row g-4" id="productGrid"></div>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p class="mb-0">© 2026 GameStore - Saber Hacer Unidad 2</p>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
